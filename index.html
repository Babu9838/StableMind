<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StableMind Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.1/ethers.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #030508; color: #F3F4F6; padding: 15px; margin: 0; }
        .container { max-width: 450px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-area { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 20px; color: #38BDF8; }
        #connectBtn { background: #1E293B; padding: 8px 15px; border-radius: 8px; color: white; border: 1px solid #334155; cursor: pointer; font-size: 12px; }
        .card { background-color: #090D14; border: 1px solid #111823; padding: 20px; border-radius: 14px; margin-bottom: 15px; }
        .label { font-size: 10px; color: #9CA3AF; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; }
        .input-field { width: 100%; background: #030508; border: 1px solid #161F30; padding: 12px; border-radius: 8px; color: white; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; color: white; cursor: pointer; margin-top: 5px; }
        .btn-gradient { background: linear-gradient(90deg, #EC4899, #8B5CF6); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area"><span>⋒</span> StableMind</div>
        <button id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
    </header>

    <!-- Circle Section -->
    <div class="card">
        <span class="label">CIRCLE PROGRAMMABLE WALLET</span>
        <input type="text" class="input-field" placeholder="User Session Token">
        <input type="password" class="input-field" placeholder="Encryption Key">
        <button class="btn-main" style="background:#0052FF;">Create / Login Circle Wallet</button>
    </div>

    <!-- CCTP Bridge -->
    <div class="card">
        <span class="label">CCTP CROSS-CHAIN BRIDGE</span>
        <select class="input-field" id="destChain">
            <option value="arc-testnet">Arc Testnet</option>
            <option value="arbitrum-sepolia">Arbitrum Sepolia</option>
        </select>
        <input type="number" class="input-field" id="bridgeAmount" placeholder="Amount to Bridge">
        <button class="btn-main btn-gradient" onclick="initiateRealBridge()">Initiate CCTP Transfer</button>
    </div>
</div>

<script>
    // Real Wallet Connect Logic
    async function connectWallet() {
        if (window.ethereum) {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            document.getElementById('connectBtn').innerText = accounts[0].substring(0, 6) + "...";
        } else {
            alert("Please install MetaMask!");
        }
    }

    // Real Bridge Execution Logic
    async function initiateRealBridge() {
        const amount = document.getElementById('bridgeAmount').value;
        if (!amount) return alert("Please enter amount!");

        try {
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            
            // এখানে CCTP স্মার্ট কন্ট্রাক্ট ইন্টারঅ্যাকশন লজিক বসবে
            alert("Confirming Bridge Request for " + amount + " USDC in your wallet...");
            
            // Transaction simulate করার জন্য একটি dummy call
            console.log("Initiating bridge to:", document.getElementById('destChain').value);
        } catch (error) {
            alert("Transaction failed or rejected.");
        }
    }
</script>

</body>
</html>
