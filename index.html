<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StableMind - Gas Station</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.1/ethers.umd.min.js"></script>
    <script src="https://goforward.circle.com/v1/w3s-web-sdk.js"></script>
    <style>
        /* Apnar purono CSS same thakbe, kono change nei */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #030508; color: #F3F4F6; padding: 15px; }
        header { background-color: #090D14; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111823; border-radius: 10px; margin-bottom: 24px; }
        .app-title { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #38BDF8, #0EA5E9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-action { width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; margin-top: 12px; color: white; }
        .card { background-color: #090D14; padding: 24px; border-radius: 14px; border: 1px solid #111823; margin-bottom: 20px; }
        .gas-input { width: 100%; background-color: #030508; border: 1px solid #161F30; border-radius: 8px; padding: 12px; color: white; margin-top: 6px; }
    </style>
</head>
<body>

    <header>
        <div class="app-title">StableMind</div>
        <button id="connectWalletBtn" onclick="connectWallet()">Connect Wallet</button>
    </header>

    <main style="max-width: 600px; margin: 0 auto;">
        <div class="card">
            <h3>USDC Transfer (Dual Mode)</h3>
            <input type="text" class="gas-input" id="recipient" placeholder="Recipient Address">
            <input type="text" class="gas-input" id="amount" placeholder="Amount (USDC)">
            
            <button class="btn-action" style="background:#0EA5E9" onclick="sendViaMetaMask()">Send via MetaMask</button>
            
            <button class="btn-action" style="background:#0052FF" onclick="sendViaCircle()">Send via Circle WaaS</button>
        </div>
    </main>

    <script>
        const USDC_ADDRESS = "0x3600000000000000000000000000000000000000";
        const ABI = ["function transfer(address to, uint256 amount) returns (bool)"];

        // 1. MetaMask/Brave Transaction
        async function sendViaMetaMask() {
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const contract = new ethers.Contract(USDC_ADDRESS, ABI, signer);
            
            const to = document.getElementById('recipient').value;
            const amt = ethers.parseUnits(document.getElementById('amount').value, 6);
            
            try {
                const tx = await contract.transfer(to, amt);
                alert("Tx Sent via MetaMask! Hash: " + tx.hash);
            } catch(e) { alert("MetaMask Tx Failed!"); }
        }

        // 2. Circle WaaS Transaction
        async function sendViaCircle() {
            // Circle SDK instance use kore transaction
            const circleSdk = new window.CircleUserSdk();
            // Ekhane apnar challenge logic add korben jeta Circle console-e ache
            alert("Circle Transaction Initated... (Ensure Challenge is active)");
            // Circle transaction code...
        }

        async function connectWallet() {
            if (window.ethereum) {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                alert("Wallet Connected!");
            }
        }
    </script>
</body>
</html>
