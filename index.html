<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StableMind - Gas Station</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.1/ethers.umd.min.js"></script>
    <script src="https://goforward.circle.com/v1/w3s-web-sdk.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #030508; color: #F3F4F6; padding: 15px; }
        header { background-color: #090D14; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111823; border-radius: 10px; margin-bottom: 24px; }
        .brand-container { display: flex; align-items: center; gap: 12px; }
        .app-title { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #38BDF8, #0EA5E9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background-color: #090D14; padding: 24px; border-radius: 14px; border: 1px solid #111823; margin-bottom: 20px; }
        .value { font-size: 30px; font-weight: bold; color: #38BDF8; margin: 8px 0; }
        .gas-input { width: 100%; background-color: #030508; border: 1px solid #161F30; border-radius: 8px; padding: 12px; color: white; margin-top: 6px; }
        .btn-action { width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; margin-top: 12px; color: white; }
        .label { font-size: 11px; color: #9CA3AF; text-transform: uppercase; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <svg width="38" height="38" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="border-radius:8px;">
                <rect width="100" height="100" fill="#0B1A30"/>
                <path d="M50 15C31.5 15 19 36 19 63C19 72.5 21 82 21 82H32C32 82 29.5 73.5 29.5 63C29.5 42.5 38 29.5 50 29.5C62 29.5 70.5 42.5 70.5 63C70.5 73.5 68 82 68 82H79C79 82 81 72.5 81 63C81 36 68.5 15 50 15Z" fill="#CBD5E1"/>
            </svg>
            <span class="app-title">StableMind</span>
        </div>
        <button class="btn-action" style="width: auto; margin-top: 0; padding: 8px 16px;" onclick="connectWallet()">Connect</button>
    </header>

    <main style="max-width: 600px; margin: 0 auto;">
        <!-- Unified Balance Kit -->
        <div class="card">
            <span class="label">UNIFIED BALANCE KIT</span>
            <div class="value" id="totalBalance">71.58 USDC</div>
            <button class="btn-action" style="background: #111823;" onclick="syncBalances()">Refresh Multi-Chain Balances</button>
        </div>

        <!-- CCTP Bridge -->
        <div class="card">
            <span class="label">CCTP CROSS-CHAIN BRIDGE</span>
            <select class="gas-input" id="destChain">
                <option>Ethereum Mainnet</option>
                <option>Arbitrum</option>
                <option>Optimism</option>
            </select>
            <input type="number" class="gas-input" id="bridgeAmount" placeholder="Amount to Bridge">
            <button class="btn-action" style="background: linear-gradient(135deg, #EC4899, #8B5CF6);" onclick="initiateCCTP()">Initiate CCTP Transfer</button>
        </div>

        <!-- Gas Station -->
        <div class="card">
            <h2>⛽ Gas Station (Abstraction)</h2>
            <button class="btn-action" style="background: #0052FF;" onclick="executeGasless()">Execute Gasless Deposit</button>
        </div>
    </main>

    <script>
        async function syncBalances() {
            alert("Syncing balances across all chains...");
            document.getElementById('totalBalance').innerText = "71.58 USDC";
        }

        async function initiateCCTP() {
            const amount = document.getElementById('bridgeAmount').value;
            if(!amount) return alert("Enter amount!");
            alert("Initiating CCTP Bridge transfer of " + amount + " USDC...");
            // CCTP contract integration code here
        }

        function executeGasless() { alert("Executing gasless transaction..."); }
        function connectWallet() { alert("Connecting wallet..."); }
    </script>
</body>
</html>
