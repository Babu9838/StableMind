<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StableMind - Gas Station</title>
    <!-- 🚀 Ethers.js CDN for Web3 Wallet Connect & Popup -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.1/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #030508; color: #F3F4F6; padding: 20px; }
        header { background-color: #090D14; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111823; border-radius: 8px; margin-bottom: 20px; }
        .app-title { font-size: 24px; font-weight: bold; color: #38BDF8; }
        .btn-connect { background: linear-gradient(135deg, #0EA5E9, #2563EB); color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .card { background-color: #090D14; padding: 20px; border-radius: 12px; border: 1px solid #111823; margin-bottom: 20px; }
        .value { font-size: 28px; font-weight: bold; color: #38BDF8; margin: 10px 0; }
        .subtext { font-size: 13px; color: #9CA3AF; }
        .status-box { background-color: #030508; border: 1px solid #161F30; padding: 12px; border-radius: 8px; margin: 10px 0; display: flex; justify-content: space-between; font-size: 14px; }
        .status-value { color: #EF4444; font-weight: bold; }
        .status-value.connected { color: #34D399; }
        .gas-input { width: 100%; background-color: #030508; border: 1px solid #161F30; border-radius: 6px; padding: 10px; color: white; margin-top: 5px; font-family: monospace; }
        .btn-action { width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; color: white; }
        .btn-gas { background: linear-gradient(135deg, #EC4899, #8B5CF6); }
        .btn-wallet { background-color: transparent; border: 1px solid #38BDF8; }
    </style>
</head>
<body>

    <header>
        <span class="app-title">StableMind</span>
        <button class="btn-connect" id="connectWalletBtn" onclick="initWallet()">Connect Wallet</button>
    </header>

    <main style="max-width: 600px; margin: 0 auto;">
        <!-- Stats -->
        <div class="card">
            <h3>Total USDC Balance</h3>
            <div class="value" id="usdcBalance">$0.00</div>
            <div class="subtext" id="balanceStatus">Wallet Not Connected</div>
        </div>

        <!-- Gas Station -->
        <div class="card">
            <h2>⛽ Gas Station (Abstraction)</h2>
            <div class="status-box">
                <span>Paymaster Status</span>
                <span style="color: #A78BFA; font-weight: bold;">Gas Tank Active</span>
            </div>
            <label style="font-size: 12px; color: #9CA3AF;">Recipient Vault Address</label>
            <input type="text" class="gas-input" id="gaslessRecipient" value="0x71C7656EC7ab88b098defB751B7401B5f6d8976F">
            <button class="btn-action btn-gas" id="gaslessSubmitBtn" onclick="signGaslessTx()">Execute Gasless Deposit</button>
        </div>

        <!-- MetaMask Provider -->
        <div class="card">
            <h2>MetaMask Web3 Provider</h2>
            <div class="status-box">
                <span>Status</span>
                <span class="status-value" id="externalStatus">Disconnected</span>
            </div>
            <div class="status-box">
                <span>Address</span>
                <span id="externalAddress" style="font-size: 12px; font-family: monospace;">Not Connected</span>
            </div>
            <button class="btn-action btn-wallet" id="controlWalletActionBtn" onclick="initWallet()">Link MetaMask Wallet</button>
        </div>
    </main>

    <script>
        let provider = null;
        let userAddress = null;

        // 🚀 পপ-আপ আনার জন্য ডিরেক্ট উইন্ডো কল
        async function initWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // মেটামাস্ক পপ-আপ ফোর্স ট্রিগার
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userAddress = accounts[0];
                    provider = new ethers.BrowserProvider(window.ethereum);
                    
                    // নেটওয়ার্ক সুইচ লজিক (Arc Testnet 0x2711)
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: '0x2711' }],
                        });
                    } catch (err) {
                        if (err.code === 4902) {
                            await window.ethereum.request({
                                method: 'wallet_addEthereumChain',
                                params: [{
                                    chainId: '0x2711',
                                    chainName: 'Arc Testnet',
                                    nativeCurrency: { name: 'ARC', symbol: 'ARC', decimals: 18 },
                                    rpcUrls: ['https://rpc-testnet.arc.network']
                                }],
                            });
                        }
                    }

                    // ইউজার ইন্টারফেস আপডেট
                    updateWalletUI(userAddress);
                    fetchBalance(userAddress);

                } catch (error) {
                    console.error(error);
                    alert("User rejected the connection request.");
                }
            } else {
                alert("MetaMask app/extension missing! Open this page inside MetaMask Browser.");
            }
        }

        function updateWalletUI(address) {
            const shortAddr = address.substring(0, 6) + "..." + address.substring(address.length - 4);
            document.getElementById('connectWalletBtn').innerText = shortAddr;
            document.getElementById('externalStatus').innerText = "Connected";
            document.getElementById('externalStatus').className = "status-value connected";
            document.getElementById('externalAddress').innerText = address;
            document.getElementById('controlWalletActionBtn').innerText = "Wallet Connected";
        }

        async function fetchBalance(address) {
            try {
                const bal = await provider.getBalance(address);
                document.getElementById('usdcBalance').innerText = `${parseFloat(ethers.formatUnits(bal, 18)).toFixed(4)} ARC`;
                document.getElementById('balanceStatus').innerText = "Arc Network Verified";
            } catch (e) {
                document.getElementById('usdcBalance').innerText = "0.00 ARC";
            }
        }

        // ⛽ রিয়েল গ্যাসলেস সিগনেচার পপ-আপ মেথড (EIP-712)
        async function signGaslessTx() {
            if (!userAddress) { return alert("Connect wallet first!"); }
            const submitBtn = document.getElementById('gaslessSubmitBtn');
            
            try {
                submitBtn.innerText = "Signing in MetaMask...";
                
                const domain = { name: "StableMind Gas Station", version: "1", chainId: 10001, verifyingContract: "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174" };
                const types = { MetaTransaction: [{ name: "nonce", type: "uint256" }, { name: "from", type: "address" }, { name: "recipient", type: "address" }] };
                const message = { nonce: Math.floor(Math.random() * 99999), from: userAddress, recipient: document.getElementById('gaslessRecipient').value };

                const signer = await provider.getSigner();
                const signature = await signer.signTypedData(domain, types, message);
                console.log("TX Signed:", signature);

                submitBtn.innerText = "Relaying Gasless TX...";
                setTimeout(() => {
                    alert("Gasless Transaction Broadcasted Successfully! Zero gas spent by user.");
                    submitBtn.innerText = "Execute Gasless Deposit";
                }, 1500);

            } catch (err) {
                alert("Signature Rejected!");
                submitBtn.innerText = "Execute Gasless Deposit";
            }
        }
    </script>
</body>
</html>
