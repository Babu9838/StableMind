<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StableMind - Gas Station</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.1/ethers.umd.min.js"></script>
    <script src="https://goforward.circle.com/v1/w3s-web-sdk.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #030508; color: #F3F4F6; padding: 15px; }
        header { background-color: #090D14; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111823; border-radius: 10px; margin-bottom: 24px; }
        .brand-container { display: flex; align-items: center; gap: 12px; }
        .app-title { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #38BDF8, #0EA5E9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-connect { background: linear-gradient(135deg, #0EA5E9, #2563EB); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .card { background-color: #090D14; padding: 24px; border-radius: 14px; border: 1px solid #111823; margin-bottom: 20px; }
        .value { font-size: 30px; font-weight: bold; color: #38BDF8; margin: 8px 0; }
        .gas-input { width: 100%; background-color: #030508; border: 1px solid #161F30; border-radius: 8px; padding: 12px; color: white; margin-top: 6px; }
        .btn-action { width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; margin-top: 12px; color: white; }
        .status-box { display: flex; justify-content: space-between; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <span class="app-title">StableMind</span>
        </div>
        <button class="btn-connect" id="connectWalletBtn" onclick="connectWallet()">Connect Wallet</button>
    </header>

    <main style="max-width: 600px; margin: 0 auto;">
        <div class="card">
            <h3>Total USDC Balance</h3>
            <div class="value" id="usdcBalance">71.58 USDC</div>
            <p style="color: #34D399; font-size: 12px;">Arc Testnet Sync Success</p>
        </div>

        <div class="card" style="border: 1px solid #0052FF;">
            <h2>🔵 Circle Programmable Wallet</h2>
            <div class="status-box"><span>Circle Status</span><span id="circleStatus" style="color:#EF4444; font-weight:bold;">Not Initialized</span></div>
            <input type="text" class="gas-input" id="sessionToken" placeholder="User Session Token">
            <input type="password" class="gas-input" id="encryptionKey" placeholder="Encryption Key">
            <button class="btn-action" style="background: linear-gradient(135deg, #0052FF, #103178);" onclick="initCircle()">Create / Login Circle Wallet</button>
        </div>

        <div class="card">
            <h2>⛽ Gas Station (Abstraction)</h2>
            <input type="text" class="gas-input" id="recipient" placeholder="Recipient Address">
            <input type="number" class="gas-input" id="amount" placeholder="Amount (USDC)">
            <button class="btn-action" style="background: linear-gradient(135deg, #EC4899, #8B5CF6);" onclick="sendTransaction()">Execute Deposit</button>
        </div>
    </main>

    <script>
        async function connectWallet() {
            if (window.ethereum) {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                alert("MetaMask Connected!");
            }
        }

        // Circle Wallet Initialization
        async function initCircle() {
            const token = document.getElementById('sessionToken').value;
            const key = document.getElementById('encryptionKey').value;

            if(!token || !key) return alert("Please enter both Token and Key!");

            try {
                const circleSdk = new window.CircleUserSdk();
                circleSdk.setAuthentication({ userToken: token, encryptionKey: key });
                
                // Circle challenge workflow
                circleSdk.executeChallenge((error) => {
                    if (!error) {
                        document.getElementById('circleStatus').innerText = "Active WaaS Wallet";
                        document.getElementById('circleStatus').style.color = "#34D399";
                        alert("Circle Wallet successfully initialized!");
                    } else {
                        alert("Circle Challenge Error: " + error.message);
                    }
                });
            } catch (e) {
                alert("Initialization failed: " + e.message);
            }
        }

        // Dual Transaction Handler
        async function sendTransaction() {
            const recipient = document.getElementById('recipient').value;
            const amount = document.getElementById('amount').value;
            
            // Logic: যদি সার্কেল ওয়ালেট একটিভ থাকে তবে সার্কেল দিয়ে, নাহলে মেটামাস্ক দিয়ে
            const isCircleActive = document.getElementById('circleStatus').innerText === "Active WaaS Wallet";
            
            if (isCircleActive) {
                alert("Executing via Circle WaaS for: " + recipient);
                // Circle transaction logic here
            } else {
                alert("Executing via MetaMask...");
                // MetaMask transaction logic here
            }
        }
    </script>
</body>
</html>
