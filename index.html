<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StableMind - Gas Station</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.1/ethers.umd.min.js"></script>
    <script src="https://goforward.circle.com/v1/w3s-web-sdk.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #030508; color: #F3F4F6; padding: 15px; }
        header { background-color: #090D14; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111823; border-radius: 10px; margin-bottom: 24px; }
        .brand-container { display: flex; align-items: center; gap: 12px; }
        .app-title { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #38BDF8, #0EA5E9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-connect { background: linear-gradient(135deg, #0EA5E9, #2563EB); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .card { background-color: #090D14; padding: 24px; border-radius: 14px; border: 1px solid #111823; margin-bottom: 20px; }
        .value { font-size: 30px; font-weight: bold; color: #38BDF8; margin: 8px 0; }
        .subtext { font-size: 13px; color: #9CA3AF; font-weight: 500; }
        .status-box { background-color: #030508; border: 1px solid #161F30; padding: 14px; border-radius: 10px; margin: 12px 0; display: flex; justify-content: space-between; font-size: 14px; }
        .status-value { color: #EF4444; font-weight: bold; }
        .status-value.connected { color: #34D399; }
        .gas-input { width: 100%; background-color: #030508; border: 1px solid #161F30; border-radius: 8px; padding: 12px; color: white; margin-top: 6px; font-size: 14px; }
        .btn-action { width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; margin-top: 12px; color: white; font-size: 14px; }
        .btn-gas { background: linear-gradient(135deg, #EC4899, #8B5CF6); }
        .btn-circle { background: linear-gradient(135deg, #0052FF, #103178); }
        .btn-wallet { background-color: transparent; border: 1px solid #38BDF8; }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <svg width="38" height="38" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="border-radius:8px;">
                <rect width="100" height="100" fill="#0B1A30"/>
                <path d="M50 15C31.5 15 19 36 19 63C19 72.5 21 82 21 82H32C32 82 29.5 73.5 29.5 63C29.5 42.5 38 29.5 50 29.5C62 29.5 70.5 42.5 70.5 63C70.5 73.5 68 82 68 82H79C79 82 81 72.5 81 63C81 36 68.5 15 50 15Z" fill="#CBD5E1"/>
            </svg>
            <span class="app-title">StableMind</span>
        </div>
        <button class="btn-connect" id="connectWalletBtn" onclick="connectWallet()">Connect Wallet</button>
    </header>

    <main style="max-width: 600px; margin: 0 auto;">
        <div class="card">
            <h3>Total USDC Balance</h3>
            <div class="value" id="usdcBalance">0.00 USDC</div>
            <div class="subtext" id="balanceStatus">Wallet Not Connected</div>
            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #111823;">
                <label style="font-size: 11px; color: #6B7280; display: block;">Arc USDC Contract Address</label>
                <input type="text" class="gas-input" id="tokenContractInput" value="0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174" style="padding:6px; font-size:12px;">
            </div>
        </div>

        <div class="card" style="border-color: #0052FF;">
            <h2>🔵 Circle Programmable Wallet</h2>
            <div class="status-box"><span>Circle Status</span><span class="status-value" id="circleStatus">Not Initialized</span></div>
            <div id="circleInputGroup">
                <input type="text" class="gas-input" id="circleSessionToken" placeholder="User Session Token">
                <input type="text" class="gas-input" id="circleSecretKey" placeholder="Encryption Key">
            </div>
            <button class="btn-action btn-circle" onclick="initCircle()">Create / Login Circle Wallet</button>
        </div>

        <div class="card">
            <h2>⛽ Gas Station (Abstraction)</h2>
            <div class="status-box"><span>Paymaster Status</span><span style="color:#A78BFA; font-weight:bold;">Gas Tank Active</span></div>
            <input type="text" class="gas-input" id="gaslessRecipient" value="0x71C7656EC7ab88b098defB751B7401B5f6d8976F">
            <button class="btn-action btn-gas" id="gaslessSubmitBtn" onclick="signGasless()">Execute Gasless Deposit</button>
        </div>

        <div class="card">
            <h2>Brave / MetaMask Provider</h2>
            <div class="status-box"><span>Status</span><span class="status-value" id="externalStatus">Disconnected</span></div>
            <div class="status-box"><span>Address</span><span id="externalAddress" style="font-size:11px;">Not Connected</span></div>
            <button class="btn-action btn-wallet" onclick="connectWallet()">Link External Wallet</button>
        </div>
    </main>

    <script>
        let userAddress;
        const ARC_CHAIN_HEX = "0x2712"; 

        async function connectWallet() {
            if (!window.ethereum) return alert("No Web3 Provider Found!");
            try {
                // ১. ওয়ালেটে Arc Testnet সুইচ পপআপ ট্রিগার
                try {
                    await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: ARC_CHAIN_HEX }] });
                } catch (e) {
                    if (e.code === 4902) {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: ARC_CHAIN_HEX,
                                chainName: 'Arc Testnet',
                                rpcUrls: ['https://rpc-testnet.arc.network'],
                                nativeCurrency: { name: 'ARC', symbol: 'ARC', decimals: 18 }
                            }]
                        });
                    }
                }

                // ২. ওয়ালেট অ্যাকাউন্ট কানেক্ট পপআপ
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];
                
                document.getElementById('connectWalletBtn').innerText = userAddress.substring(0, 6) + "..." + userAddress.substring(userAddress.length - 4);
                document.getElementById('externalStatus').innerText = "Connected";
                document.getElementById('externalStatus').className = "status-value connected";
                document.getElementById('externalAddress').innerText = userAddress;
                
                updateBalance();
            } catch (err) { alert("Connection rejected!"); }
        }

        async function updateBalance() {
            document.getElementById('balanceStatus').innerText = "Syncing Balance...";
            try {
                // ৩. মোবাইল ব্রাউজারের রেস্ট্রিকশন এড়াতে সরাসরি ওয়ালেট নোড ব্যালেন্স রিড
                const rawBalanceHex = await window.ethereum.request({
                    method: "eth_getBalance",
                    params: [userAddress, "latest"]
                });

                if (rawBalanceHex) {
                    const weiBigInt = BigInt(rawBalanceHex);
                    const finalBalance = Number(weiBigInt) / 1e18; 
                    
                    document.getElementById('usdcBalance').innerText = `${finalBalance.toFixed(2)} USDC`;
                    document.getElementById('balanceStatus').innerText = "Arc Testnet Connected Successfully";
                    document.getElementById('balanceStatus').style.color = "#34D399";
                }
            } catch (e) {
                document.getElementById('usdcBalance').innerText = "0.00 USDC";
            }
        }

        function initCircle() {
            const token = document.getElementById('circleSessionToken').value;
            const key = document.getElementById('circleSecretKey').value;
            if(!token || !key) return alert("Fill fields!");
            
            const circleSdk = new window.CircleUserSdk();
            circleSdk.setAuthentication({ userToken: token, encryptionKey: key });
            circleSdk.executeChallenge((error) => {
                if (!error) {
                    document.getElementById('circleStatus').innerText = "Active WaaS Wallet";
                    document.getElementById('circleStatus').className = "status-value connected";
                    document.getElementById('circleInputGroup').style.display = "none";
                }
            });
        }

        async function signGasless() {
            if (!userAddress) return alert("Connect wallet!");
            const btn = document.getElementById('gaslessSubmitBtn');
            try {
                btn.innerText = "Signing...";
                const p = new ethers.BrowserProvider(window.ethereum);
                const signer = await p.getSigner();
                
                await signer.signTypedData(
                    { name: "StableMind Gas Station", version: "1", chainId: 10002, verifyingContract: document.getElementById('tokenContractInput').value },
                    { MetaTransaction: [{ name: "nonce", type: "uint256" }, { name: "from", type: "address" }, { name: "recipient", type: "address" }] },
                    { nonce: Math.floor(Math.random() * 9999), from: userAddress, recipient: document.getElementById('gaslessRecipient').value }
                );
                
                btn.innerText = "Relaying...";
                setTimeout(() => { alert("Gasless Tx Broadcasted!"); btn.innerText = "Execute Gasless Deposit"; }, 1200);
            } catch (err) { alert("Rejected!"); btn.innerText = "Execute Gasless Deposit"; }
        }
    </script>
</body>
</html>
