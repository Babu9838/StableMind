<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StableMind Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.1/ethers.umd.min.js"></script>
    <style>
        body { background-color: #030508; color: #fff; font-family: sans-serif; padding: 20px; }
        .dashboard-container { max-width: 450px; margin: 0 auto; }
        h2 { font-size: 18px; color: #38BDF8; margin-bottom: 15px; }
        
        .card { background-color: #090D14; border: 1px solid #111823; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        
        .label { font-size: 11px; color: #9CA3AF; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .value { font-size: 20px; margin-bottom: 15px; }
        
        .btn-refresh { width: 100%; background-color: #1A1F2E; border: none; padding: 10px; border-radius: 6px; color: #fff; cursor: pointer; font-size: 13px; }
        
        .input-field { width: 100%; background: #030508; border: 1px solid #1F2937; padding: 12px; border-radius: 6px; color: #fff; margin-bottom: 15px; box-sizing: border-box; }
        
        .btn-bridge { width: 100%; background: linear-gradient(90deg, #EC4899, #8B5CF6); border: none; padding: 12px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h1 style="font-size: 20px; margin-bottom: 20px;">StableMind Dashboard</h1>

    <!-- Unified Balance Kit -->
    <div class="card">
        <span class="label">UNIFIED BALANCE KIT</span>
        <div class="value" id="balanceDisplay">Syncing...</div>
        <button class="btn-refresh" onclick="refreshBalances()">Refresh Multi-Chain Balances</button>
    </div>

    <!-- CCTP Cross-Chain Bridge -->
    <div class="card">
        <span class="label">CCTP CROSS-CHAIN BRIDGE</span>
        <select class="input-field" id="chainSelect">
            <option>Ethereum Mainnet</option>
            <option>Arbitrum</option>
            <option>Optimism</option>
        </select>
        <input type="number" class="input-field" placeholder="Amount to Bridge">
        <button class="btn-bridge" onclick="initiateBridge()">Initiate CCTP Transfer</button>
    </div>
</div>

<script>
    function refreshBalances() {
        document.getElementById('balanceDisplay').innerText = "71.58 USDC";
        alert("Balances updated across all chains.");
    }

    async function initiateBridge() {
        alert("CCTP Bridge Initialized. Please confirm via your wallet.");
        // এখানে CCTP স্মার্ট কন্ট্রাক্ট কল করার লজিক বসবে
    }
</script>

</body>
</html>
